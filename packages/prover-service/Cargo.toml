[workspace]

[package]
name = "kage-prover-service"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sp1-sdk = { version = "6.0.2", features = ["network"] }
kage-zk-lib = { path = "../zk-circuits/lib" }
uuid = { version = "1", features = ["v4"] }
hex = "0.4"
tower-http = { version = "0.6", features = ["cors", "trace"] }
tower_governor = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
dashmap = "6"
